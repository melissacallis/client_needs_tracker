<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respite Program &middot; Client Status Board</title>
<!-- Bootstrap 5.3.3 CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --ink: #1c2b29;
    --slate: #48605c;
    --muted: #7c8d8a;
    --line: #dfe6e2;
    --paper: #f2f6f4;
    --card: #ffffff;
    --teal-deep: #0d3d33;
    --teal: #12735c;
    --teal-light: #e2f2ec;
    --male-bg: #dceaf6;
    --male-fg: #2c5f8a;
    --female-bg: #e7ddf5;
    --female-fg: #5e3a96;
    --red: #a32d2d;
    --amber: #8a5a0b;
    --green: #276a2f;
    --shadow: 0 1px 2px rgba(20,40,35,0.06), 0 4px 14px rgba(20,40,35,0.05);
  }
  body {
    margin: 0;
    font-family: "Segoe UI", -apple-system, Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  header {
    background: linear-gradient(135deg, var(--teal-deep), var(--teal));
    color: #fff;
    padding: 22px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.16);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-mark svg { width: 20px; height: 20px; }
  .brand-text h1 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: 0.2px; }
  .brand-text .sub { font-size: 11.5px; color: rgba(255,255,255,0.72); margin-top: 1px; }
  header .meta {
    font-size: 12px;
    color: rgba(255,255,255,0.78);
    font-variant-numeric: tabular-nums;
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #6fd3a0;
    display: inline-block;
    margin-right: 6px;
  }
  button.icon-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    border-radius: 7px;
    padding: 7px 14px;
    font-size: 12.5px;
    cursor: pointer;
  }
  button.icon-btn:hover { background: rgba(255,255,255,0.2); }

  main { max-width: 1200px; margin: 0 auto; padding: 26px 20px 60px; }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 22px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .summary-card .num { font-size: 27px; font-weight: 700; line-height: 1; }
  .summary-card .lbl { font-size: 11px; color: var(--muted); margin-top: 7px; letter-spacing: 0.3px; text-transform: uppercase; }
  .summary-card.red .num { color: var(--red); }
  .summary-card.amber .num { color: var(--amber); }
  .summary-card.green .num { color: var(--green); }
  .summary-card.teal .num { color: var(--teal-deep); }

  .filter-row {
    display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    border: 1px solid var(--line); background: var(--card); border-radius: 20px;
    padding: 7px 15px; font-size: 12.5px; cursor: pointer; color: var(--slate);
  }
  .filter-btn.active { background: var(--teal-deep); color: #fff; border-color: var(--teal-deep); }

  .legend { display: flex; gap: 16px; margin-left: auto; align-items: center; font-size: 11.5px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 5px; vertical-align: -1px; }

  .board-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .board-column-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--line);
  }
  .board-column-header .dot { width: 10px; height: 10px; border-radius: 50%; }
  .board-column-header.male .dot { background: var(--male-fg); }
  .board-column-header.female .dot { background: var(--female-fg); }

  .client-list { display: flex; flex-direction: column; gap: 12px; }

  .client-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 6px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    box-shadow: var(--shadow);
  }
  .client-card.urgent-red { border-left-color: var(--red); }
  .client-card.urgent-amber { border-left-color: var(--amber); }
  .client-card.urgent-green { border-left-color: var(--green); }

  .client-card-grid {
    display: grid;
    grid-template-columns: 42px 1fr 1.2fr 1.2fr 1fr;
    gap: 12px;
    align-items: start;
  }

  .client-card.empty-bed { opacity: 0.55; }

  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px;
  }
  .avatar.male { background: var(--male-bg); color: var(--male-fg); }
  .avatar.female { background: var(--female-bg); color: var(--female-fg); }
  .avatar.unknown { background: var(--teal-light); color: var(--teal); }

  .field-label { font-size: 10px; color: var(--teal); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; font-weight: 700; padding-bottom: 3px; border-bottom: 1px solid var(--line); }
  .field-value { font-size: 13.5px; color: var(--ink); font-weight: 600; }
  .field-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  .cell {
    border-left: 1px solid var(--line);
    padding-left: 10px;
  }

  /* Custom tweaks for Bootstrap alerts inside cards */
  .card-notifications {
    grid-column: 1 / -1;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-notifications .alert {
    padding: 6px 12px;
    font-size: 12px;
    margin-bottom: 0;
    border-radius: 6px;
  }

  @keyframes pulse-alert {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .med-due-alert {
    animation: pulse-alert 1.2s infinite ease-in-out;
  }

  @media (max-width: 760px) {
    .client-card-grid { grid-template-columns: 1fr; }
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
    .board-columns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21s-7-4.35-9.5-8.5C.5 8.5 2.5 5 6 5c2 0 3.3 1 4 2 .7-1 2-2 4-2 3.5 0 5.5 3.5 3.5 7.5C19 16.65 12 21 12 21z"/>
      </svg>
    </div>
    <div class="brand-text">
      <h1>Crisis Respite Program</h1>
      <div class="sub">Client Status Board</div>
    </div>
  </div>
  <div class="header-right">
    <span class="meta" id="last-updated"><span class="status-dot"></span>Connecting...</span>
    <button class="icon-btn" onclick="showConfig()">Settings</button>
    <button class="icon-btn" onclick="refreshNow()">Refresh</button>
  </div>
</header>

<main>

  <div id="config-screen" style="display:none;" class="card p-4 mx-auto style-config">
    <h2>Connect your data source</h2>
    <p class="text-muted">Paste the Web App URL from your Google Apps Script deployment.</p>
    <label for="script-url" class="form-label fw-bold">Apps Script Web App URL</label>
    <input type="text" id="script-url" class="form-control mb-3" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="btn btn-teal text-white w-100" style="background:var(--teal);" onclick="saveConfig()">Save and connect</button>
    <div id="config-error" class="text-danger mt-2" style="display:none;"></div>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="summary-bar">
      <div class="summary-card red">
        <div class="num" id="count-red">0</div>
        <div class="lbl">Needs action</div>
      </div>
      <div class="summary-card amber">
        <div class="num" id="count-amber">0</div>
        <div class="lbl">Upcoming / watch</div>
      </div>
      <div class="summary-card green">
        <div class="num" id="count-green">0</div>
        <div class="lbl">On track</div>
      </div>
      <div class="summary-card teal">
        <div class="num" id="count-total">0</div>
        <div class="lbl">Total clients</div>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="red" onclick="setFilter('red')">Needs action</button>
      <button class="filter-btn" data-filter="amber" onclick="setFilter('amber')">Upcoming</button>
      <button class="filter-btn" data-filter="green" onclick="setFilter('green')">On track</button>
      <div class="legend">
        <span><span class="legend-dot" style="background:var(--male-bg);border:1px solid var(--male-fg);"></span>Male</span>
        <span><span class="legend-dot" style="background:var(--female-bg);border:1px solid var(--female-fg);"></span>Female</span>
      </div>
    </div>

    <div class="board-columns">
      <div>
        <div class="board-column-header male"><span class="dot"></span>Male</div>
        <div class="client-list" id="client-list-male"></div>
      </div>
      <div>
        <div class="board-column-header female"><span class="dot"></span>Female</div>
        <div class="client-list" id="client-list-female"></div>
      </div>
    </div>
    <div class="text-center p-5 text-muted" id="empty-state" style="display:none;">No clients match this filter.</div>
  </div>

  <div class="text-center p-5 text-danger" id="error-state" style="display:none;"></div>

</main>

<script>
let scriptUrl = localStorage.getItem('clientStatusScriptUrl') || '';
let clients = [];
let currentFilter = 'all';

const APPT_SOON_DAYS = 2;
const MED_WINDOW_MIN = 15;

function initials(str) { return (str || '?').trim(); }

function genderFromBed(bed) {
  if (!bed) return 'unknown';
  const b = bed.trim().toUpperCase();
  if (b.startsWith('M')) return 'male';
  if (b.startsWith('F')) return 'female';
  return 'unknown';
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function parseMedTimesToMinutes(medTimesStr) {
  const results = [];
  if (!medTimesStr) return results;
  const matches = medTimesStr.match(/\d{1,2}:\d{2}\s*(AM|PM)/gi);
  if (!matches) return results;
  matches.forEach(m => {
    const parts = m.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
    if (!parts) return;
    let h = parseInt(parts[1], 10);
    const min = parseInt(parts[2], 10);
    const ampm = parts[3].toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    results.push(h * 60 + min);
  });
  return results;
}

function isMedDueSoon(medTimesStr) {
  const times = parseMedTimesToMinutes(medTimesStr);
  if (times.length === 0) return false;
  const str = new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' });
  const central = new Date(str);
  const nowMin = central.getHours() * 60 + central.getMinutes();
  return times.some(t => {
    let diff = Math.abs(t - nowMin);
    diff = Math.min(diff, 1440 - diff);
    return diff <= MED_WINDOW_MIN;
  });
}

function evaluateScripts(c) {
  const status = (c['Scripts Status'] || '').trim();
  const submittedDate = c['Submitted Date'];

  if (status !== 'Submitted') {
    return { label: 'Not submitted', level: 'danger' };
  }
  if (!submittedDate) {
    return { label: 'Submitted (no date)', level: 'warning' };
  }
  const d = new Date(submittedDate);
  const today = new Date();
  const submittedIsToday = !isNaN(d) && d.toDateString() === today.toDateString();
  const pastFourPM = today.getHours() >= 16;

  if (submittedIsToday && !pastFourPM) {
    return { label: 'Submitted \u2014 ready by 4:00 PM', level: 'warning' };
  }
  return { label: 'Ready for pickup', level: 'success' };
}

function evaluateClient(c) {
  const apptDateRaw = c['Appointment Date'];
  const alerts = [];
  let worst = 'green';

  function escalate(level) {
    if (level === 'red') worst = 'red';
    else if (level === 'amber' && worst !== 'red') worst = 'amber';
  }

  // Appointment status alert check
  if (!apptDateRaw) {
    alerts.push({ type: 'danger', message: 'Appointment not scheduled' });
    escalate('red');
  } else {
    const until = daysUntil(apptDateRaw);
    if (until !== null) {
      if (until < 0) {
        alerts.push({ type: 'danger', message: 'Appointment date passed \u2014 action needed' });
        escalate('red');
      } else if (until <= APPT_SOON_DAYS) {
        alerts.push({ type: 'warning', message: `Upcoming appointment in ${until} day(s)` });
        escalate('amber');
      }
    }
  }

  // Scripts status alert check
  const scripts = evaluateScripts(c);
  if (scripts.level === 'danger') {
    alerts.push({ type: 'danger', message: `Scripts: ${scripts.label}` });
    escalate('red');
  } else if (scripts.level === 'warning') {
    alerts.push({ type: 'warning', message: `Scripts: ${scripts.label}` });
    escalate('amber');
  }

  return { alerts, urgency: worst, scripts };
}

function buildCardHtml(c, ev) {
  const gender = genderFromBed(c['Bed']);
  const card = document.createElement('div');
  const medDue = isMedDueSoon(c['Med Times']);

  card.className = `client-card urgent-${ev.urgency}`;

  // Generate Bootstrap Notifications / Alerts
  let alertBannersHtml = ev.alerts.map(a => 
    `<div class="alert alert-${a.type} d-flex align-items-center py-1 px-2 m-0" role="alert">
       <span class="me-2">⚠️</span> <div>${a.message}</div>
     </div>`
  ).join('');

  // Patient notes banner (Bootstrap Info Alert)
  const notesText = (c['Notes'] || '').trim();
  if (notesText) {
    alertBannersHtml += `
      <div class="alert alert-info d-flex align-items-center py-1 px-2 m-0" role="alert">
        <span class="me-2">ℹ️</span> <div><strong>Note:</strong> ${notesText}</div>
      </div>`;
  }

  // Med time notification banner (Bootstrap Urgent Alert)
  const medTimes = (c['Med Times'] || '').trim();
  if (medDue) {
    alertBannersHtml += `
      <div class="alert alert-danger med-due-alert d-flex align-items-center py-1 px-2 m-0 fw-bold" role="alert">
        <span class="me-2">💊</span> <div>MEDS DUE NOW: ${medTimes}</div>
      </div>`;
  } else if (medTimes) {
    alertBannersHtml += `
      <div class="alert alert-light border d-flex align-items-center py-1 px-2 m-0 text-muted" role="alert">
        <span class="me-2">⏰</span> <div><strong>Med Times:</strong> ${medTimes}</div>
      </div>`;
  }

  card.innerHTML = `
    <div class="client-card-grid">
      <div class="avatar ${gender}">${initials(c['Client Initials'])}</div>
      
      <div class="cell">
        <div class="field-label">Client Info</div>
        <div class="field-value">${c['Bed'] || '\u2014'}</div>
        <div class="field-sub">ID: ${c['Member ID'] || '\u2014'}</div>
        <div class="field-sub">${c['Case Manager'] || ''}</div>
      </div>

      <div class="cell">
        <div class="field-label">Appointment</div>
        <div class="field-value">${c['Appointment Date'] || 'Not scheduled'}</div>
        <div class="field-sub">${c['Appointment With'] || ''} ${c['Doctor'] ? '• ' + c['Doctor'] : ''}</div>
      </div>

      <div class="cell">
        <div class="field-label">Scripts / Pharmacy</div>
        <div class="field-value">${c['Pharmacy'] || '\u2014'}</div>
        <div class="field-sub"><span class="badge bg-${ev.scripts.level}">${ev.scripts.label}</span></div>
      </div>

      <div class="cell">
        <div class="field-label">Status</div>
        <div class="field-value">${c['Admit Date'] ? 'Admitted: ' + c['Admit Date'] : '\u2014'}</div>
        <span class="badge bg-${ev.urgency === 'red' ? 'danger' : ev.urgency === 'amber' ? 'warning text-dark' : 'success'} mt-1">
          ${ev.urgency === 'red' ? 'Action Needed' : ev.urgency === 'amber' ? 'Watch' : 'On Track'}
        </span>
      </div>

      <div class="card-notifications">
        ${alertBannersHtml}
      </div>
    </div>
  `;

  return card;
}

function buildEmptyBedCard(bedLabel) {
  const card = document.createElement('div');
  card.className = 'client-card empty-bed';
  card.innerHTML = `
    <div class="client-card-grid">
      <div class="avatar unknown">\u2014</div>
      <div>
        <div class="field-label">Bed</div>
        <div class="field-value">${bedLabel} \u2014 Open</div>
      </div>
    </div>
  `;
  return card;
}

function renderClients() {
  const listMale = document.getElementById('client-list-male');
  const listFemale = document.getElementById('client-list-female');
  const emptyState = document.getElementById('empty-state');
  listMale.innerHTML = '';
  listFemale.innerHTML = '';

  let counts = { red: 0, amber: 0, green: 0 };

  const evaluated = clients.map(c => ({ raw: c, eval: evaluateClient(c), gender: genderFromBed(c['Bed']) }));
  evaluated.forEach(item => {
    if ((item.raw['Client Initials'] || '').trim()) counts[item.eval.urgency]++;
  });

  document.getElementById('count-red').textContent = counts.red;
  document.getElementById('count-amber').textContent = counts.amber;
  document.getElementById('count-green').textContent = counts.green;
  document.getElementById('count-total').textContent =
    evaluated.filter(e => (e.raw['Client Initials'] || '').trim()).length;

  const filtered = currentFilter === 'all'
    ? evaluated
    : evaluated.filter(e => (e.raw['Client Initials'] || '').trim() ? e.eval.urgency === currentFilter : true);

  const bedSort = (a, b) => (a.raw['Bed'] || '').localeCompare(b.raw['Bed'] || '', undefined, { numeric: true });

  const maleRows = filtered.filter(e => e.gender === 'male').sort(bedSort);
  const femaleRows = filtered.filter(e => e.gender === 'female').sort(bedSort);

  emptyState.style.display = (maleRows.length === 0 && femaleRows.length === 0 && currentFilter !== 'all') ? 'block' : 'none';

  maleRows.forEach(({ raw: c, eval: ev }) => {
    const hasClient = (c['Client Initials'] || '').trim();
    listMale.appendChild(hasClient ? buildCardHtml(c, ev) : buildEmptyBedCard(c['Bed'] || 'Unassigned'));
  });
  femaleRows.forEach(({ raw: c, eval: ev }) => {
    const hasClient = (c['Client Initials'] || '').trim();
    listFemale.appendChild(hasClient ? buildCardHtml(c, ev) : buildEmptyBedCard(c['Bed'] || 'Unassigned'));
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderClients();
}

async function fetchData() {
  if (!scriptUrl) { showConfig(); return; }
  try {
    const res = await fetch(scriptUrl);
    const rawText = await res.text();
    let json = JSON.parse(rawText);
    if (json.error) { showError('Access issue: ' + json.error); return; }
    clients = json.clients || [];
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('error-state').style.display = 'none';
    document.getElementById('config-screen').style.display = 'none';
    document.getElementById('last-updated').innerHTML =
      '<span class="status-dot"></span>Updated ' + new Date(json.updated).toLocaleTimeString();
    renderClients();
  } catch (err) {
    showError('Error connecting to script: ' + err.message);
  }
}

function showError(msg) {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
  document.getElementById('error-state').textContent = msg;
}

function showConfig() {
  document.getElementById('config-screen').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('error-state').style.display = 'none';
  document.getElementById('script-url').value = scriptUrl;
}

function saveConfig() {
  const val = document.getElementById('script-url').value.trim();
  if (!val.startsWith('https://script.google.com/')) return;
  scriptUrl = val;
  localStorage.setItem('clientStatusScriptUrl', val);
  fetchData();
}

function refreshNow() { fetchData(); }

setInterval(fetchData, 5 * 60 * 1000);
setInterval(() => { if (clients.length) renderClients(); }, 60 * 1000);

fetchData();
</script>
</body>
</html>
